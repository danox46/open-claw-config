<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplify Logistics - Enterprise Features Without Enterprise Complexity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      color: #333;
      background-color: #f9fafb;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 2rem;
    }
    .container {
      max-width: 1200px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4rem;
    }
    .content {
      text-align: center;
      color: white;
      max-width: 700px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    .subheadline {
      font-size: 1.5rem;
      font-weight: 400;
      opacity: 0.95;
      margin-bottom: 2rem;
    }
    .form-wrapper {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 500px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.25rem;
    }
    input[type="email"] {
      padding: 0.875rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input[type="email"]:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      background: #667eea;
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1.125rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background: #5a67d8;
    }
    .footer {
      text-align: center;
      color: white;
      opacity: 0.8;
      font-size: 0.875rem;
      margin-top: 2rem;
    }
    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }
      .subheadline {
        font-size: 1.25rem;
      }
      .form-wrapper {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="container">
      <div class="content">
        <h1>Enterprise Features Without Enterprise Complexity</h1>
        <p class="subheadline">The logistics platform built for mid-size companies - live in 30 days or less.</p>
      </div>
      <div class="form-wrapper">
        <form id="demo-request-form">
          <label for="email">
            Email
          </label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="your@email.com"
            autocomplete="email"
          >
          <button type="submit">Request Demo</button>
        </form>
      </div>
      <div class="footer">
        © 2024 Simplify Logistics. All rights reserved.
      </div>
    </div>
  </section>
  <script>
    document.getElementById('demo-request-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = this.querySelector('input[type="email"]').value;
      // Implement demo request logic here
      this.querySelector('button').textContent = 'Request Sent!';
      this.querySelector('button').disabled = true;
      this.querySelector('button').style.backgroundColor = '#10b981';
    });
  </script>
</body>
</html>
